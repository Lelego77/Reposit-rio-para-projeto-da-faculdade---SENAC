<!DOCTYPE html>
<html>

<head>
<title>CondoShare</title>
</head>

<body>

<h1>CondoShare</h1>

<h2>Cadastrar Item</h2>

<input id="itemName" placeholder="Nome do item">

<button onclick="createItem()">Cadastrar</button>

<h2>Itens disponíveis</h2>

<div id="items"></div>

<script>

async function loadItems(){

const res = await fetch("http://localhost:3000/items")
const items = await res.json()

const div = document.getElementById("items")

div.innerHTML=""

items.forEach(item=>{

div.innerHTML += `
<p>
${item.name}
<button onclick="reserveItem(${item.id})">Reservar</button>
</p>
`

})

}

async function createItem(){

const name = document.getElementById("itemName").value

await fetch("http://localhost:3000/items",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({name})

})

loadItems()

}

async function reserveItem(itemId){

await fetch("http://localhost:3000/reservations",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

itemId:itemId,
userId:1,
date:"2026-03-08"

})

})

alert("Item reservado!")

}

loadItems()

</script>

</body>

</html>
